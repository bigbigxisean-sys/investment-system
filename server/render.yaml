services:
- buildCommand: npm install
  env: node
  envVars:
  - key: JWT_SECRET
    value: change-this-to-a-random-secret-key
  - key: ADMIN_USERNAME
    value: admin
  - key: ADMIN_PASSWORD
    value: admin123
  healthCheckPath: /api/health
  name: investment-system-api
  startCommand: node server.js
  type: web
